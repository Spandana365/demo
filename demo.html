<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Deployment Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0f172a; /* Matching your dashboard dark theme */
            color: white;
        }
        .card {
            text-align: center;
            padding: 2rem;
            border: 1px solid #1e293b;
            border-radius: 12px;
            background-color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #38bdf8; /* Sky blue accent */
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello from CloudOps!</h1>
        <p>Deployment successful. Your pipeline is working perfectly.</p>
    </div>
</body>
</html>
